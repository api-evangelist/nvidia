openapi: 3.1.0
info:
  title: NVIDIA Developer API
  description: >-
    NVIDIA provides developer APIs for GPU computing, AI/ML model training and inference, and graphics. The platform includes APIs for CUDA, TensorRT, Omniverse, and cloud GPU services.
  version: '1.0'
  contact:
    name: Nvidia Developer Support
    url: https://developer.nvidia.com/
externalDocs:
  description: Documentation
  url: https://developer.nvidia.com/
servers:
  - url: https://api.nvidia.com
    description: Production
tags:
  - name: GPU
    description: GPU operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - GPU
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
